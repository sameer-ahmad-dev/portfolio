<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="510" cy="80" r="100" fill="rgba(255,255,255,0.15)"/>
  <circle cx="80" cy="340" r="70" fill="rgba(255,255,255,0.1)"/>
  <!-- Bi-directional sync -->
  <g transform="translate(130,40)">
    <!-- Odoo box -->
    <rect x="0" y="30" width="110" height="80" rx="12" fill="rgba(255,255,255,0.4)" stroke="rgba(120,80,60,0.5)" stroke-width="2"/>
    <text x="55" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="18" fill="rgba(80,50,30,0.9)">Odoo</text>
    <text x="55" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,50,30,0.6)">ERP System</text>
    <!-- Arrows -->
    <line x1="125" y1="58" x2="210" y2="58" stroke="rgba(120,80,60,0.6)" stroke-width="2.5"/>
    <polygon points="208,52 220,58 208,64" fill="rgba(120,80,60,0.6)"/>
    <line x1="210" y1="82" x2="125" y2="82" stroke="rgba(120,80,60,0.6)" stroke-width="2.5"/>
    <polygon points="127,76 115,82 127,88" fill="rgba(120,80,60,0.6)"/>
    <!-- Sync icon in middle -->
    <circle cx="167" cy="70" r="14" fill="rgba(255,255,255,0.5)" stroke="rgba(120,80,60,0.4)" stroke-width="1.5"/>
    <path d="M160,67 A8,8 0 1,1 174,70" fill="none" stroke="rgba(120,80,60,0.7)" stroke-width="2" stroke-linecap="round"/>
    <polygon points="174,66 174,74 178,70" fill="rgba(120,80,60,0.7)"/>
    <!-- Pipedrive box -->
    <rect x="225" y="30" width="110" height="80" rx="12" fill="rgba(255,255,255,0.4)" stroke="rgba(120,80,60,0.5)" stroke-width="2"/>
    <text x="280" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="16" fill="rgba(80,50,30,0.9)">Pipedrive</text>
    <text x="280" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,50,30,0.6)">CRM Platform</text>
    <!-- Data items flowing -->
    <g transform="translate(30,125)">
      <rect x="0" y="0" width="75" height="22" rx="6" fill="rgba(255,255,255,0.35)" stroke="rgba(120,80,60,0.3)" stroke-width="1"/>
      <text x="38" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(80,50,30,0.7)">Contacts</text>
      <rect x="85" y="0" width="65" height="22" rx="6" fill="rgba(255,255,255,0.35)" stroke="rgba(120,80,60,0.3)" stroke-width="1"/>
      <text x="118" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(80,50,30,0.7)">Deals</text>
      <rect x="160" y="0" width="75" height="22" rx="6" fill="rgba(255,255,255,0.35)" stroke="rgba(120,80,60,0.3)" stroke-width="1"/>
      <text x="198" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(80,50,30,0.7)">Activities</text>
      <rect x="245" y="0" width="60" height="22" rx="6" fill="rgba(255,255,255,0.35)" stroke="rgba(120,80,60,0.3)" stroke-width="1"/>
      <text x="275" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(80,50,30,0.7)">Leads</text>
    </g>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="rgba(80,50,30,0.9)">Pipedrive CRM Sync</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(80,50,30,0.6)">Bi-directional • Real-time Synchronization</text>
  <g transform="translate(125,310)">
    <rect x="0" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.35)" stroke="rgba(120,80,60,0.3)" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,50,30,0.8)">Odoo</text>
    <rect x="80" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.35)" stroke="rgba(120,80,60,0.3)" stroke-width="1"/>
    <text x="130" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,50,30,0.8)">Pipedrive API</text>
    <rect x="190" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.35)" stroke="rgba(120,80,60,0.3)" stroke-width="1"/>
    <text x="235" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,50,30,0.8)">Webhooks</text>
  </g>
</svg>