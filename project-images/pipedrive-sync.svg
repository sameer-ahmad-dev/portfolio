      <rect x="0" y="6" width="108" height="40" rx="6" fill="#fff" stroke="#e0e6ed" stroke-width="1"/>
      <rect x="0" y="6" width="3" height="40" fill="#ff8a3d"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#1a202c">Acme Corp</text>
      <text x="10" y="32" font-family="Arial,sans-serif" font-size="8" fill="#666">$24,000</text>
      <rect x="0" y="50" width="108" height="40" rx="6" fill="#fff" stroke="#e0e6ed" stroke-width="1"/>
      <rect x="0" y="50" width="3" height="40" fill="#ff8a3d"/>
      <text x="10" y="64" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#1a202c">Globex Inc</text>
      <text x="10" y="76" font-family="Arial,sans-serif" font-size="8" fill="#666">$18,500</text>
      <rect x="0" y="94" width="108" height="40" rx="6" fill="#fff" stroke="#e0e6ed" stroke-width="1"/>
      <rect x="0" y="94" width="3" height="40" fill="#ff8a3d"/>
      <text x="10" y="108" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#1a202c">Initech</text>
      <text x="10" y="120" font-family="Arial,sans-serif" font-size="8" fill="#666">$32,100</text>
