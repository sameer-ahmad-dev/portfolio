      <rect x="0" y="6" width="3" height="40" fill="#fbbf24"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#1a202c">Stark Industries</text>
      <text x="10" y="32" font-family="Arial,sans-serif" font-size="8" fill="#666">$45,000</text>
      <rect x="0" y="50" width="108" height="40" rx="6" fill="#fff" stroke="#e0e6ed" stroke-width="1"/>
