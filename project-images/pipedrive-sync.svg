<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a3d"/><stop offset="100%" style="stop-color:#ff5e3a"/>
    </linearGradient>
    <pattern id="dotsPD" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.12)"/></pattern>
    <filter id="shPD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsPD)"/>
  <!-- Pipeline kanban -->
  <g transform="translate(60,40)" filter="url(#shPD)">
    <rect x="0" y="0" width="480" height="240" rx="12" fill="#fff"/>
    <rect x="0" y="0" width="480" height="36" rx="12" fill="#26292c"/>
    <rect x="0" y="26" width="480" height="10" fill="#26292c"/>
    <text x="20" y="22" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#fff">SALES PIPELINE</text>
    <text x="460" y="22" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Bi-directional sync ↻</text>
    <!-- 4 columns -->
    <g transform="translate(14,50)">
