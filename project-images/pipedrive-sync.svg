      <rect x="0" y="50" width="3" height="40" fill="#0AA64D"/>
      <text x="10" y="64" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#1a202c">Cyberdyne</text>
      <text x="10" y="76" font-family="Arial,sans-serif" font-size="8" fill="#666">$89,500</text>
