    <line x1="20" y1="62" x2="140" y2="62" stroke="#e0e6ed" stroke-width="1"/>
    <text x="80" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#666">AUTOMATED</text>
    <text x="80" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#27c93f">✓ Tax Calculation</text>
    <text x="80" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#27c93f">✓ e-Invoicing</text>
    <text x="80" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#27c93f">✓ Compliance</text>
    <text x="80" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#27c93f">✓ Audit Reports</text>
  </g>
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#11998e"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">SRB Tax Integration</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Sindh Revenue Board automated tax compliance &amp; e-invoicing</text>
