    <text x="224" y="62" text-anchor="end" font-family="monospace" font-weight="800" font-size="10" fill="#1a202c">SRB-2024-1247</text>
    <line x1="16" y1="70" x2="224" y2="70" stroke="#e0e6ed" stroke-width="0.5"/>
    <text x="16" y="84" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#666">DATE</text>
    <text x="224" y="84" text-anchor="end" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1a202c">15-Mar-2024</text>
    <line x1="16" y1="92" x2="224" y2="92" stroke="#e0e6ed" stroke-width="0.5"/>
    <text x="16" y="106" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#666">AMOUNT</text>
    <text x="224" y="106" text-anchor="end" font-family="monospace" font-weight="800" font-size="11" fill="#11998e">PKR 1,80,000</text>
    <line x1="16" y1="114" x2="224" y2="114" stroke="#e0e6ed" stroke-width="0.5"/>
    <text x="16" y="128" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#666">SST 13%</text>
    <text x="224" y="128" text-anchor="end" font-family="monospace" font-weight="800" font-size="11" fill="#11998e">PKR 23,400</text>
    <line x1="16" y1="136" x2="224" y2="136" stroke="#e0e6ed" stroke-width="0.5"/>
    <text x="16" y="152" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1a202c">TOTAL</text>
    <text x="224" y="152" text-anchor="end" font-family="monospace" font-weight="900" font-size="13" fill="#11998e">PKR 2,03,400</text>
    <!-- QR + status -->
    <rect x="16" y="166" width="60" height="60" fill="#1a202c"/>
    <rect x="22" y="172" width="10" height="10" fill="#fff"/>
    <rect x="60" y="172" width="10" height="10" fill="#fff"/>
    <rect x="22" y="210" width="10" height="10" fill="#fff"/>
    <rect x="38" y="180" width="4" height="4" fill="#fff"/>
    <rect x="46" y="186" width="4" height="4" fill="#fff"/>
    <rect x="42" y="194" width="4" height="4" fill="#fff"/>
    <rect x="50" y="200" width="4" height="4" fill="#fff"/>
    <rect x="60" y="200" width="4" height="4" fill="#fff"/>
    <rect x="86" y="166" width="138" height="60" rx="8" fill="rgba(39,201,63,0.12)"/>
    <circle cx="106" cy="190" r="14" fill="#27c93f"/>
    <path d="M100,190 L104,194 L112,184" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="155" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#0F7B3F">FILED &amp;</text>
    <text x="155" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#0F7B3F">REPORTED</text>
  </g>
  <!-- SRB Sindh badge -->
  <g transform="translate(380,80)">
