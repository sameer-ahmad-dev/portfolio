<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/><stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    <pattern id="dotsM" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.15)"/></pattern>
    <filter id="shM" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsM)"/>
  <!-- v12 card -->
  <g transform="translate(60,60)" filter="url(#shM)">
    <rect x="0" y="0" width="160" height="180" rx="14" fill="#fff"/>
    <rect x="0" y="0" width="160" height="40" rx="14" fill="#888"/>
    <rect x="0" y="26" width="160" height="14" fill="#888"/>
    <text x="80" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="16" fill="#fff">Odoo v12</text>
    <g transform="translate(16,52)">
      <rect x="0" y="0" width="130" height="14" rx="3" fill="#f5f7fa"/>
      <rect x="0" y="0" width="100" height="14" rx="3" fill="#888" opacity="0.6"/>
      <text x="0" y="28" font-family="Arial,sans-serif" font-size="9" fill="#666">12,847 products</text>
      <text x="0" y="42" font-family="Arial,sans-serif" font-size="9" fill="#666">8,320 partners</text>
      <text x="0" y="56" font-family="Arial,sans-serif" font-size="9" fill="#666">23,000 invoices</text>
      <text x="0" y="70" font-family="Arial,sans-serif" font-size="9" fill="#666">5,433 orders</text>
      <text x="0" y="84" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1a202c">50,000+ records</text>
      <rect x="0" y="92" width="130" height="22" rx="11" fill="rgba(136,136,136,0.15)"/>
      <text x="65" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#666">LEGACY</text>
    </g>
  </g>
  <!-- Migration arrow -->
  <g transform="translate(245,135)">
    <circle cx="55" cy="20" r="28" fill="#fff"/>
    <path d="M40,20 L70,20 M62,12 L70,20 L62,28" stroke="#a18cd1" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M44,8 L55,2 L66,8" fill="none" stroke="#a18cd1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="55" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="9" fill="#fff">ZERO LOSS</text>
  </g>
  <!-- v18 card -->
  <g transform="translate(380,60)" filter="url(#shM)">
    <rect x="0" y="0" width="160" height="180" rx="14" fill="#fff"/>
    <rect x="0" y="0" width="160" height="40" rx="14" fill="#a18cd1"/>
    <rect x="0" y="26" width="160" height="14" fill="#a18cd1"/>
    <text x="80" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="16" fill="#fff">Odoo v18</text>
    <g transform="translate(16,52)">
      <rect x="0" y="0" width="130" height="14" rx="3" fill="#f5f7fa"/>
      <rect x="0" y="0" width="130" height="14" rx="3" fill="#a18cd1"/>
      <text x="65" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#fff">100%</text>
      <text x="0" y="28" font-family="Arial,sans-serif" font-size="9" fill="#27c93f">✓ 12,847 products</text>
      <text x="0" y="42" font-family="Arial,sans-serif" font-size="9" fill="#27c93f">✓ 8,320 partners</text>
      <text x="0" y="56" font-family="Arial,sans-serif" font-size="9" fill="#27c93f">✓ 23,000 invoices</text>
      <text x="0" y="70" font-family="Arial,sans-serif" font-size="9" fill="#27c93f">✓ 5,433 orders</text>
      <text x="0" y="84" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1a202c">50,000+ records</text>
      <rect x="0" y="92" width="130" height="22" rx="11" fill="rgba(39,201,63,0.15)"/>
      <text x="65" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#27c93f">✓ MIGRATED</text>
    </g>
  </g>
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#a18cd1"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Odoo v12 → v18 Migration</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Full ERP migration with zero data loss &amp; minimal downtime</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="118" height="22" rx="11" fill="#1a202c"/>
      <text x="59" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fbbf24">★ CLIENT PROJECT</text>
    </g>
    <g transform="translate(156,68)">
      <rect x="0" y="0" width="116" height="22" rx="11" fill="rgba(161,140,209,0.18)" stroke="#a18cd1" stroke-width="1"/>
      <text x="58" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#7B2FF7">DATA MIGRATION</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#a18cd1"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">RECORDS</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#fff">50K+</text>
    </g>
  </g>
</svg>
