<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="520" cy="80" r="100" fill="rgba(255,255,255,0.06)"/>
  <circle cx="70" cy="340" r="70" fill="rgba(255,255,255,0.04)"/>
  <!-- Migration: v12 -> v18 -->
  <g transform="translate(140,45)">
    <!-- Left box (v12) -->
    <rect x="0" y="30" width="100" height="100" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <text x="50" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="rgba(255,255,255,0.9)">v12</text>
    <text x="50" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="12" fill="rgba(255,255,255,0.6)">Legacy</text>
    <!-- Arrow -->
    <line x1="115" y1="80" x2="195" y2="80" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
    <polygon points="195,72 215,80 195,88" fill="rgba(255,255,255,0.8)"/>
    <!-- Sync circles on arrow -->
    <circle cx="145" cy="68" r="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <path d="M141,65 A5,5 0 1,1 149,68" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <circle cx="175" cy="92" r="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <path d="M179,95 A5,5 0 1,1 171,92" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <!-- Right box (v18) -->
    <rect x="220" y="30" width="100" height="100" rx="12" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
    <text x="270" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="white">v18</text>
    <text x="270" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="12" fill="rgba(255,255,255,0.8)">Modern</text>
    <!-- Sparkle on v18 -->
    <text x="310" y="42" font-size="18" fill="rgba(255,255,255,0.8)">✦</text>
    <!-- Data flow dots -->
    <circle cx="135" cy="145" r="3" fill="rgba(255,255,255,0.5)"/>
    <circle cx="160" cy="145" r="3" fill="rgba(255,255,255,0.5)"/>
    <circle cx="185" cy="145" r="3" fill="rgba(255,255,255,0.5)"/>
    <text x="160" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">50,000+ Records</text>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="white">Odoo v12 to v18 Migration</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">Zero Data Loss • Minimal Downtime</text>
  <g transform="translate(120,310)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Python</text>
    <rect x="90" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="140" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">PostgreSQL</text>
    <rect x="200" y="0" width="110" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="255" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Shell Scripts</text>
  </g>
</svg>