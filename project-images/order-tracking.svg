<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/><stop offset="100%" style="stop-color:#ee0979"/>
    </linearGradient>
    <pattern id="dotsOT" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.12)"/></pattern>
    <filter id="shOT" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsOT)"/>
  <!-- Mobile phone -->
  <g transform="translate(220,20)" filter="url(#shOT)">
    <rect x="0" y="0" width="160" height="270" rx="22" fill="#1a1f35"/>
    <rect x="6" y="6" width="148" height="258" rx="16" fill="#fff"/>
    <!-- App header -->
    <rect x="6" y="6" width="148" height="46" rx="16" fill="#ff6a00"/>
    <rect x="6" y="40" width="148" height="12" fill="#ff6a00"/>
    <text x="80" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="7" fill="rgba(255,255,255,0.85)">10:42 AM ●●●●</text>
    <text x="80" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="12" fill="#fff">TRACK ORDER</text>
    <!-- Order header -->
    <text x="20" y="72" font-family="Arial,sans-serif" font-weight="900" font-size="12" fill="#1a202c">Order #4521</text>
    <text x="140" y="72" text-anchor="end" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#27c93f">● Out for delivery</text>
    <!-- Progress steps -->
    <g transform="translate(20,86)">
      <line x1="6" y1="8" x2="6" y2="120" stroke="#e0e6ed" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="8" x2="6" y2="92" stroke="#27c93f" stroke-width="2" stroke-linecap="round"/>
      <!-- Step 1 -->
      <circle cx="6" cy="8" r="6" fill="#27c93f"/>
      <text x="3" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="6" fill="#fff">✓</text>
      <text x="20" y="6" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Order placed</text>
      <text x="20" y="16" font-family="Arial,sans-serif" font-size="7" fill="#999">Mar 10, 2:14 PM</text>
      <!-- Step 2 -->
      <circle cx="6" cy="38" r="6" fill="#27c93f"/>
      <text x="3" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="6" fill="#fff">✓</text>
      <text x="20" y="36" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Confirmed</text>
      <text x="20" y="46" font-family="Arial,sans-serif" font-size="7" fill="#999">Mar 10, 2:48 PM</text>
      <!-- Step 3 -->
      <circle cx="6" cy="68" r="6" fill="#27c93f"/>
      <text x="3" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="6" fill="#fff">✓</text>
      <text x="20" y="66" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Shipped</text>
      <text x="20" y="76" font-family="Arial,sans-serif" font-size="7" fill="#999">Mar 11, 9:20 AM</text>
      <!-- Step 4 -->
      <circle cx="6" cy="92" r="7" fill="#ff6a00" stroke="#fff" stroke-width="2"/>
      <circle cx="6" cy="92" r="11" fill="#ff6a00" opacity="0.3"/>
      <text x="20" y="90" font-family="Arial,sans-serif" font-weight="900" font-size="9" fill="#ff6a00">Out for delivery</text>
      <text x="20" y="100" font-family="Arial,sans-serif" font-size="7" fill="#999">Today, 10:30 AM</text>
      <!-- Step 5 -->
      <circle cx="6" cy="120" r="6" fill="#fff" stroke="#e0e6ed" stroke-width="2"/>
      <text x="20" y="118" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#999">Delivered</text>
      <text x="20" y="128" font-family="Arial,sans-serif" font-size="7" fill="#999">Est. by 3:00 PM</text>
    </g>
    <!-- Action button -->
    <rect x="20" y="232" width="120" height="22" rx="11" fill="#ff6a00"/>
    <text x="80" y="246" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#fff">VIEW INVOICE PDF</text>
  </g>
  <!-- API badge (left) -->
  <g transform="translate(60,130)">
    <rect x="0" y="0" width="120" height="60" rx="10" fill="rgba(255,255,255,0.95)"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#ff6a00">REST API</text>
    <text x="60" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#666">Search • Track</text>
    <text x="60" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#666">Notify • Invoice</text>
  </g>
  <!-- Push notification (right) -->
  <g transform="translate(420,90)">
    <rect x="0" y="0" width="140" height="50" rx="10" fill="rgba(255,255,255,0.95)"/>
    <circle cx="18" cy="25" r="10" fill="#ee0979"/>
    <text x="18" y="29" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#fff">!</text>
    <text x="34" y="20" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Push Update</text>
    <text x="34" y="32" font-family="Arial,sans-serif" font-size="8" fill="#666">Order out for delivery</text>
    <text x="34" y="42" font-family="Arial,sans-serif" font-size="7" fill="#999">just now</text>
  </g>
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#ee0979"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Customer Order Tracking</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Mobile app REST API for order search, tracking &amp; invoices</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="118" height="22" rx="11" fill="#1a202c"/>
      <text x="59" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fbbf24">★ CLIENT PROJECT</text>
    </g>
    <g transform="translate(156,68)">
      <rect x="0" y="0" width="116" height="22" rx="11" fill="rgba(238,9,121,0.15)" stroke="#ee0979" stroke-width="1"/>
      <text x="58" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#ee0979">REST + JSON</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#ee0979"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">PLATFORM</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#fff">MOBILE</text>
    </g>
  </g>
</svg>
