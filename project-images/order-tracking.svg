<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#ee0979"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="520" cy="70" r="110" fill="rgba(255,255,255,0.06)"/>
  <circle cx="70" cy="350" r="80" fill="rgba(255,255,255,0.04)"/>
  <!-- Mobile app with order tracking -->
  <g transform="translate(210,20)">
    <!-- Phone frame -->
    <rect x="30" y="5" width="120" height="195" rx="16" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
    <!-- Screen -->
    <rect x="38" y="25" width="104" height="155" rx="4" fill="rgba(255,255,255,0.1)"/>
    <!-- Status bar -->
    <text x="90" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">9:41</text>
    <!-- App header -->
    <rect x="38" y="25" width="104" height="24" fill="rgba(255,255,255,0.15)"/>
    <text x="90" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="rgba(255,255,255,0.9)">My Orders</text>
    <!-- Search bar -->
    <rect x="46" y="55" width="88" height="18" rx="9" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="68" y="67" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Search order...</text>
    <!-- Order card 1 -->
    <rect x="46" y="80" width="88" height="38" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="54" y="93" font-family="Arial,sans-serif" font-weight="600" font-size="8" fill="rgba(255,255,255,0.8)">#ORD-2847</text>
    <rect x="100" y="85" width="28" height="12" rx="4" fill="rgba(100,255,100,0.25)"/>
    <text x="114" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="rgba(100,255,100,0.9)">Shipped</text>
    <rect x="54" y="100" width="40" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="54" y="108" width="30" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <!-- Order card 2 -->
    <rect x="46" y="124" width="88" height="38" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="54" y="137" font-family="Arial,sans-serif" font-weight="600" font-size="8" fill="rgba(255,255,255,0.7)">#ORD-2846</text>
    <rect x="95" y="129" width="33" height="12" rx="4" fill="rgba(255,200,50,0.25)"/>
    <text x="112" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="rgba(255,200,50,0.9)">Processing</text>
    <rect x="54" y="144" width="40" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="54" y="152" width="30" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Bottom nav -->
    <rect x="38" y="168" width="104" height="12" fill="rgba(255,255,255,0.08)"/>
    <!-- Home button -->
    <rect x="82" y="188" width="16" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="24" fill="white">Customer Order Tracking</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">Mobile App API • Search Orders & Track Delivery</text>
  <g transform="translate(110,310)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">REST API</text>
    <rect x="90" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="125" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Python</text>
    <rect x="170" y="0" width="60" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="200" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">JSON</text>
    <rect x="240" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="280" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Mobile</text>
  </g>
</svg>