<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="520" cy="70" r="110" fill="rgba(255,255,255,0.06)"/>
  <circle cx="60" cy="340" r="80" fill="rgba(255,255,255,0.04)"/>
  <!-- Document / Tax icon -->
  <g transform="translate(220,40)">
    <!-- Main document -->
    <rect x="20" y="10" width="100" height="130" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
    <!-- Fold corner -->
    <path d="M95,10 L120,10 L120,35 Z" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <!-- Lines on document -->
    <line x1="40" y1="45" x2="100" y2="45" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="40" y1="62" x2="90" y2="62" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="40" y1="79" x2="95" y2="79" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="40" y1="96" x2="80" y2="96" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <!-- Checkmark -->
    <circle cx="70" cy="118" r="14" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
    <polyline points="62,118 68,124 80,112" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- FBR badge -->
    <rect x="110" y="50" width="55" height="30" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <text x="137" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="rgba(255,255,255,0.9)">FBR</text>
    <!-- Connection arrows -->
    <path d="M70,145 L70,160 L30,160 L30,145" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M70,145 L70,160 L115,160 L115,145" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="white">FBR Tax Integration</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">Federal Board of Revenue • Automated Compliance</text>
  <g transform="translate(140,310)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">REST API</text>
    <rect x="90" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="125" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Python</text>
    <rect x="170" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Odoo 16</text>
  </g>
</svg>