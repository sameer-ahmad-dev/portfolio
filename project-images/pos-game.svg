<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2FF7"/>
      <stop offset="100%" style="stop-color:#F107A3"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1a1f35"/>
    </linearGradient>
    <pattern id="dotsGame" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.2" fill="rgba(255,255,255,0.08)"/>
    </pattern>
    <filter id="softShadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsGame)"/>
  <!-- Game console -->
  <g transform="translate(160,40)" filter="url(#softShadow4)">
    <rect x="0" y="0" width="280" height="230" rx="14" fill="#1a1f35" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Top bar -->
    <rect x="0" y="0" width="280" height="36" rx="14" fill="rgba(255,255,255,0.06)"/>
    <rect x="0" y="22" width="280" height="14" fill="rgba(255,255,255,0.06)"/>
    <text x="20" y="24" font-family="monospace" font-weight="900" font-size="13" fill="#fff">SNAKE</text>
    <text x="260" y="24" text-anchor="end" font-family="monospace" font-weight="900" font-size="12" fill="#FFEB3B">SCORE: 247</text>
    <!-- Game grid -->
    <rect x="20" y="50" width="240" height="160" rx="8" fill="url(#screen)" stroke="rgba(247,7,163,0.5)" stroke-width="1.5"/>
    <!-- Grid lines -->
    <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
      <line x1="40" y1="50" x2="40" y2="210"/>
      <line x1="60" y1="50" x2="60" y2="210"/>
      <line x1="80" y1="50" x2="80" y2="210"/>
      <line x1="100" y1="50" x2="100" y2="210"/>
      <line x1="120" y1="50" x2="120" y2="210"/>
      <line x1="140" y1="50" x2="140" y2="210"/>
      <line x1="160" y1="50" x2="160" y2="210"/>
      <line x1="180" y1="50" x2="180" y2="210"/>
      <line x1="200" y1="50" x2="200" y2="210"/>
      <line x1="220" y1="50" x2="220" y2="210"/>
      <line x1="240" y1="50" x2="240" y2="210"/>
      <line x1="20" y1="70" x2="260" y2="70"/>
      <line x1="20" y1="90" x2="260" y2="90"/>
      <line x1="20" y1="110" x2="260" y2="110"/>
      <line x1="20" y1="130" x2="260" y2="130"/>
      <line x1="20" y1="150" x2="260" y2="150"/>
      <line x1="20" y1="170" x2="260" y2="170"/>
      <line x1="20" y1="190" x2="260" y2="190"/>
    </g>
    <!-- Snake body -->
    <g>
      <rect x="60" y="110" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="80" y="110" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="100" y="110" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="100" y="130" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="100" y="150" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="120" y="150" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="140" y="150" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="160" y="150" width="18" height="18" rx="3" fill="#27c93f"/>
      <rect x="180" y="150" width="18" height="18" rx="4" fill="#a6e3a1"/>
      <circle cx="187" cy="157" r="2" fill="#000"/>
      <circle cx="194" cy="157" r="2" fill="#000"/>
    </g>
    <!-- Apple -->
    <circle cx="229" cy="99" r="8" fill="#f38ba8"/>
    <rect x="228" y="86" width="2" height="5" fill="#0AA64D"/>
    <!-- Bottom keys -->
    <g transform="translate(20,217)">
      <rect x="0" y="0" width="240" height="9" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
      <text x="120" y="7" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.5)">↑ ↓ ← →   /   SWIPE TO PLAY</text>
    </g>
  </g>
  <!-- Controller icon (left) -->
  <g transform="translate(60,140)">
    <rect x="-22" y="-8" width="58" height="40" rx="16" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <circle cx="-8" cy="14" r="7" fill="rgba(255,255,255,0.7)"/>
    <circle cx="22" cy="6" r="4" fill="#FFEB3B"/>
    <circle cx="28" cy="16" r="4" fill="#27c93f"/>
    <circle cx="18" cy="22" r="4" fill="#f38ba8"/>
    <text x="0" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#fff">PLAY!</text>
  </g>
  <!-- High score badge (right) -->
  <g transform="translate(488,140)">
    <rect x="-30" y="-8" width="60" height="40" rx="10" fill="#FFEB3B"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="8" fill="#1a202c">HIGH</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#1a202c">512</text>
  </g>
  <!-- Bottom info bar -->
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#F107A3"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">POS Snake Game</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Fun break for POS operators • touch &amp; keyboard ready</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="148" height="22" rx="11" fill="#714B67"/>
      <text x="74" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fff">✓ Compatible with Odoo 19</text>
    </g>
    <g transform="translate(186,68)">
      <rect x="0" y="0" width="68" height="22" rx="11" fill="rgba(247,7,163,0.15)" stroke="#F107A3" stroke-width="1"/>
      <text x="34" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#F107A3">POS</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#7B2FF7"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">PRICE</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="14" fill="#fff">FREE</text>
    </g>
  </g>
</svg>
