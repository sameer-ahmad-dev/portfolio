<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="520" cy="60" r="100" fill="rgba(255,255,255,0.06)"/>
  <circle cx="80" cy="360" r="70" fill="rgba(255,255,255,0.04)"/>
  <!-- Brain / Neural network -->
  <g transform="translate(220,50)">
    <!-- Brain outline -->
    <ellipse cx="80" cy="70" rx="65" ry="55" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
    <!-- Neural nodes -->
    <circle cx="50" cy="45" r="6" fill="rgba(255,255,255,0.9)"/>
    <circle cx="110" cy="45" r="6" fill="rgba(255,255,255,0.9)"/>
    <circle cx="80" cy="35" r="6" fill="rgba(255,255,255,0.9)"/>
    <circle cx="60" cy="75" r="6" fill="rgba(255,255,255,0.9)"/>
    <circle cx="100" cy="75" r="6" fill="rgba(255,255,255,0.9)"/>
    <circle cx="80" cy="95" r="6" fill="rgba(255,255,255,0.9)"/>
    <!-- Connections -->
    <line x1="50" y1="45" x2="80" y2="35" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="80" y1="35" x2="110" y2="45" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="50" y1="45" x2="60" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="110" y1="45" x2="100" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="50" y1="45" x2="100" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="110" y1="45" x2="60" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="60" y1="75" x2="80" y2="95" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="100" y1="75" x2="80" y2="95" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Chart line -->
    <polyline points="10,130 35,125 60,110 85,115 110,90 135,70 155,50" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="10,130 35,125 60,110 85,115 110,90 135,70 155,50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8" stroke-linecap="round"/>
    <!-- Arrow up -->
    <polygon points="155,50 148,62 162,62" fill="rgba(255,255,255,0.8)"/>
  </g>
  <!-- Text -->
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="white">AI Demand Forecasting</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">Machine Learning • 92% Prediction Accuracy</text>
  <g transform="translate(135,310)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="45" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">TensorFlow</text>
    <rect x="100" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="135" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Pandas</text>
    <rect x="180" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="230" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Odoo API</text>
  </g>
</svg>