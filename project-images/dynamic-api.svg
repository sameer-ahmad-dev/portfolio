<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="codeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="rgba(0,212,255,0.15)"/>
    </pattern>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dots)"/>
  <!-- Connection lines bg -->
  <g opacity="0.5">
    <circle cx="50" cy="100" r="5" fill="#00d4ff"/>
    <circle cx="50" cy="160" r="5" fill="#00d4ff"/>
    <circle cx="50" cy="220" r="5" fill="#00d4ff"/>
    <line x1="55" y1="100" x2="135" y2="80" stroke="rgba(0,212,255,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="55" y1="160" x2="135" y2="155" stroke="rgba(0,212,255,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="55" y1="220" x2="135" y2="225" stroke="rgba(0,212,255,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <circle cx="550" cy="100" r="5" fill="#cba6f7"/>
    <circle cx="550" cy="160" r="5" fill="#cba6f7"/>
    <circle cx="550" cy="220" r="5" fill="#cba6f7"/>
    <line x1="545" y1="100" x2="465" y2="80" stroke="rgba(203,166,247,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="545" y1="160" x2="465" y2="155" stroke="rgba(203,166,247,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="545" y1="220" x2="465" y2="225" stroke="rgba(203,166,247,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
  </g>
  <!-- API editor card -->
  <g transform="translate(140,40)" filter="url(#softShadow2)">
    <rect x="0" y="0" width="320" height="220" rx="12" fill="url(#codeBg)" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
    <rect x="0" y="0" width="320" height="32" rx="12" fill="rgba(255,255,255,0.06)"/>
    <rect x="0" y="22" width="320" height="10" fill="rgba(255,255,255,0.06)"/>
    <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="32" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="48" cy="16" r="5" fill="#27c93f"/>
    <text x="160" y="20" text-anchor="middle" font-family="monospace" font-weight="600" font-size="10" fill="rgba(255,255,255,0.7)">api.yoursite.com/v1/</text>
    <!-- Endpoints -->
    <g transform="translate(16,46)">
      <rect x="0" y="0" width="56" height="22" rx="5" fill="#27c93f"/>
      <text x="28" y="15" text-anchor="middle" font-family="monospace" font-weight="800" font-size="11" fill="#fff">GET</text>
      <text x="66" y="15" font-family="monospace" font-size="12" fill="#89dceb">/api/products</text>
      <rect x="248" y="2" width="40" height="18" rx="9" fill="rgba(39,201,63,0.2)"/>
      <text x="268" y="14" text-anchor="middle" font-family="monospace" font-weight="700" font-size="9" fill="#a6e3a1">200</text>
    </g>
    <g transform="translate(16,76)">
      <rect x="0" y="0" width="56" height="22" rx="5" fill="#74c7ec"/>
      <text x="28" y="15" text-anchor="middle" font-family="monospace" font-weight="800" font-size="11" fill="#fff">POST</text>
      <text x="66" y="15" font-family="monospace" font-size="12" fill="#89dceb">/api/orders</text>
      <rect x="248" y="2" width="40" height="18" rx="9" fill="rgba(39,201,63,0.2)"/>
      <text x="268" y="14" text-anchor="middle" font-family="monospace" font-weight="700" font-size="9" fill="#a6e3a1">201</text>
    </g>
    <g transform="translate(16,106)">
      <rect x="0" y="0" width="56" height="22" rx="5" fill="#fab387"/>
      <text x="28" y="15" text-anchor="middle" font-family="monospace" font-weight="800" font-size="11" fill="#fff">PUT</text>
      <text x="66" y="15" font-family="monospace" font-size="12" fill="#89dceb">/api/customers/:id</text>
      <rect x="248" y="2" width="40" height="18" rx="9" fill="rgba(39,201,63,0.2)"/>
      <text x="268" y="14" text-anchor="middle" font-family="monospace" font-weight="700" font-size="9" fill="#a6e3a1">200</text>
    </g>
    <g transform="translate(16,136)">
      <rect x="0" y="0" width="56" height="22" rx="5" fill="#f38ba8"/>
      <text x="28" y="15" text-anchor="middle" font-family="monospace" font-weight="800" font-size="11" fill="#fff">DEL</text>
      <text x="66" y="15" font-family="monospace" font-size="12" fill="#89dceb">/api/invoices/:id</text>
      <rect x="248" y="2" width="40" height="18" rx="9" fill="rgba(39,201,63,0.2)"/>
      <text x="268" y="14" text-anchor="middle" font-family="monospace" font-weight="700" font-size="9" fill="#a6e3a1">204</text>
    </g>
    <line x1="16" y1="170" x2="304" y2="170" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="3,2"/>
    <g transform="translate(16,180)">
      <circle cx="6" cy="10" r="5" fill="#cba6f7"/>
      <text x="20" y="14" font-family="monospace" font-weight="600" font-size="11" fill="#cba6f7">webhook.on_create()</text>
      <rect x="240" y="2" width="48" height="18" rx="9" fill="rgba(203,166,247,0.2)"/>
      <text x="264" y="14" text-anchor="middle" font-family="monospace" font-weight="700" font-size="9" fill="#cba6f7">FIRED</text>
    </g>
  </g>
  <!-- Bottom info bar -->
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#00d4ff"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Dynamic API Endpoints</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">No-code REST endpoints &amp; webhooks for any Odoo model</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="148" height="22" rx="11" fill="#714B67"/>
      <text x="74" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fff">✓ Compatible with Odoo 19</text>
    </g>
    <g transform="translate(186,68)">
      <rect x="0" y="0" width="92" height="22" rx="11" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1"/>
      <text x="46" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#0891B2">REST + WEBHOOKS</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#0891B2"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">FROM</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="14" fill="#fff">$15.00</text>
    </g>
  </g>
</svg>
