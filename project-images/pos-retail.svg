<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="510" cy="90" r="100" fill="rgba(255,255,255,0.06)"/>
  <circle cx="90" cy="330" r="70" fill="rgba(255,255,255,0.04)"/>
  <!-- POS Terminal -->
  <g transform="translate(210,35)">
    <!-- Screen -->
    <rect x="20" y="10" width="130" height="90" rx="8" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
    <!-- Screen content -->
    <rect x="30" y="20" width="70" height="12" rx="3" fill="rgba(255,255,255,0.3)"/>
    <rect x="30" y="38" width="50" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="30" y="52" width="60" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="30" y="66" width="40" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
    <text x="120" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="16" fill="rgba(255,255,255,0.9)">$247</text>
    <!-- Stand -->
    <rect x="70" y="100" width="30" height="20" fill="rgba(255,255,255,0.3)"/>
    <rect x="50" y="118" width="70" height="8" rx="3" fill="rgba(255,255,255,0.4)"/>
    <!-- Card reader -->
    <rect x="150" y="60" width="35" height="65" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
    <rect x="156" y="68" width="23" height="16" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- Keypad dots -->
    <circle cx="161" cy="95" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="171" cy="95" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="181" cy="95" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="161" cy="107" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="171" cy="107" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="181" cy="107" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <!-- Barcode -->
    <g transform="translate(5,55)">
      <rect x="0" y="0" width="3" height="30" fill="rgba(255,255,255,0.6)"/>
      <rect x="5" y="0" width="1.5" height="30" fill="rgba(255,255,255,0.6)"/>
      <rect x="9" y="0" width="3" height="30" fill="rgba(255,255,255,0.6)"/>
      <rect x="14" y="0" width="1" height="30" fill="rgba(255,255,255,0.6)"/>
      <rect x="17" y="0" width="2.5" height="30" fill="rgba(255,255,255,0.6)"/>
    </g>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="white">POS Retail System</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">Point of Sale • Multi-Store Checkout</text>
  <g transform="translate(120,310)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="45" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">JavaScript</text>
    <rect x="100" y="0" width="60" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="130" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">OWL</text>
    <rect x="170" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Odoo 17</text>
    <rect x="260" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="295" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Python</text>
  </g>
</svg>