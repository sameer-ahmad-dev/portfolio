<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <pattern id="dotsDR" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.12)"/>
    </pattern>
    <filter id="shDR" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsDR)"/>
  <!-- Settings panel (left) -->
  <g transform="translate(50,40)" filter="url(#shDR)">
    <rect x="0" y="0" width="240" height="240" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="240" height="36" rx="10" fill="#714B67"/>
    <rect x="0" y="26" width="240" height="10" fill="#714B67"/>
    <text x="120" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#fff">⚙ INVENTORY SETTINGS</text>
    <!-- Enable toggle -->
    <text x="16" y="56" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#1a202c">Discount Restriction</text>
    <rect x="180" y="48" width="44" height="18" rx="9" fill="#dc2626"/>
    <circle cx="212" cy="57" r="7" fill="#fff"/>
    <text x="16" y="70" font-family="Arial,sans-serif" font-size="8" fill="#999">Enable max discount cap</text>
    <line x1="16" y1="80" x2="224" y2="80" stroke="#f0f0f0" stroke-width="0.5"/>
    <!-- Max discount field -->
    <text x="16" y="96" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#1a202c">Maximum Discount</text>
    <rect x="16" y="102" width="80" height="22" rx="4" fill="#fff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="56" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#dc2626">10.00 %</text>
    <text x="100" y="117" font-family="Arial,sans-serif" font-size="8" fill="#999">cap on listed products</text>
    <line x1="16" y1="134" x2="224" y2="134" stroke="#f0f0f0" stroke-width="0.5"/>
    <!-- Restricted Products -->
    <text x="16" y="150" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#1a202c">Restricted Products</text>
    <g transform="translate(16,156)">
      <rect x="0" y="0" width="62" height="16" rx="8" fill="#dc2626" opacity="0.15"/>
      <text x="31" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#dc2626">Laptop ×</text>
      <rect x="66" y="0" width="58" height="16" rx="8" fill="#dc2626" opacity="0.15"/>
      <text x="95" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#dc2626">iPad ×</text>
      <rect x="128" y="0" width="76" height="16" rx="8" fill="#dc2626" opacity="0.15"/>
      <text x="166" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#dc2626">Headphones ×</text>
    </g>
    <line x1="16" y1="184" x2="224" y2="184" stroke="#f0f0f0" stroke-width="0.5"/>
    <!-- Restricted Users -->
    <text x="16" y="200" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#1a202c">Restricted Users</text>
    <g transform="translate(16,206)">
      <circle cx="10" cy="10" r="9" fill="#fa709a"/>
      <text x="10" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="9" fill="#fff">SA</text>
      <circle cx="32" cy="10" r="9" fill="#74c7ec"/>
      <text x="32" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="9" fill="#fff">JD</text>
      <circle cx="54" cy="10" r="9" fill="#27c93f"/>
      <text x="54" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="9" fill="#fff">MK</text>
      <circle cx="76" cy="10" r="9" fill="#FFC837"/>
      <text x="76" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="9" fill="#fff">AB</text>
      <text x="96" y="13" font-family="Arial,sans-serif" font-size="9" fill="#666">+ 4 more sales reps</text>
    </g>
  </g>
  <!-- Sale order line (right) showing block -->
  <g transform="translate(310,50)" filter="url(#shDR)">
    <rect x="0" y="0" width="240" height="220" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="240" height="32" rx="10" fill="#1a202c"/>
    <rect x="0" y="22" width="240" height="10" fill="#1a202c"/>
    <text x="120" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#fff">SALE ORDER • SO-1247</text>
    <!-- Order line -->
    <text x="16" y="50" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#999">PRODUCT</text>
    <text x="16" y="64" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1a202c">Laptop Pro 15"</text>
    <text x="16" y="80" font-family="Arial,sans-serif" font-size="9" fill="#666">Qty: 1 × $1,899.00</text>
    <line x1="16" y1="90" x2="224" y2="90" stroke="#f0f0f0" stroke-width="0.5"/>
    <!-- Discount input -->
    <text x="16" y="106" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#999">DISCOUNT %</text>
    <rect x="16" y="112" width="80" height="26" rx="4" fill="#fff" stroke="#dc2626" stroke-width="2"/>
    <text x="56" y="129" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="14" fill="#dc2626">25.00</text>
    <!-- Error block popup -->
    <g transform="translate(16,146)">
      <rect x="0" y="0" width="208" height="60" rx="6" fill="rgba(220,38,38,0.1)" stroke="#dc2626" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="8" fill="#dc2626"/>
      <text x="14" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="12" fill="#fff">!</text>
      <text x="28" y="18" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#dc2626">DISCOUNT BLOCKED</text>
      <text x="10" y="36" font-family="Arial,sans-serif" font-size="9" fill="#7f1d1d">User "Sameer" cannot apply</text>
      <text x="10" y="48" font-family="Arial,sans-serif" font-size="9" fill="#7f1d1d">more than 10% on Laptop Pro 15"</text>
    </g>
  </g>
  <!-- Bottom info bar -->
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#dc2626"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Discount Restriction</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Cap maximum discount per user &amp; product across Sales, Purchases &amp; Invoices</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="148" height="22" rx="11" fill="#714B67"/>
      <text x="74" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fff">✓ Compatible with Odoo 19</text>
    </g>
    <g transform="translate(186,68)">
      <rect x="0" y="0" width="100" height="22" rx="11" fill="rgba(220,38,38,0.15)" stroke="#dc2626" stroke-width="1"/>
      <text x="50" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#dc2626">SALES + STOCK</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#dc2626"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">PRICE</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="14" fill="#fff">FREE</text>
    </g>
  </g>
</svg>
