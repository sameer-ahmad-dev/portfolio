        <text x="20" y="11" font-family="Arial,sans-serif" font-weight="600" font-size="10" fill="#1a202c">Contacts</text>
        <text x="156" y="11" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#13B5EA">128</text>
      </g>
      <g transform="translate(0,32)">
        <circle cx="6" cy="7" r="6" fill="#13B5EA"/>
        <text x="6" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#fff">✓</text>
        <text x="20" y="11" font-family="Arial,sans-serif" font-weight="600" font-size="10" fill="#1a202c">Products</text>
        <text x="156" y="11" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#13B5EA">347</text>
      </g>
      <g transform="translate(0,52)">
        <circle cx="6" cy="7" r="6" fill="#13B5EA"/>
        <text x="6" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#fff">✓</text>
        <text x="20" y="11" font-family="Arial,sans-serif" font-weight="600" font-size="10" fill="#1a202c">Invoices</text>
        <text x="156" y="11" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#13B5EA">89</text>
      </g>
      <g transform="translate(0,72)">
        <circle cx="6" cy="7" r="6" fill="#13B5EA"/>
        <text x="6" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#fff">✓</text>
        <text x="20" y="11" font-family="Arial,sans-serif" font-weight="600" font-size="10" fill="#1a202c">Payments</text>
        <text x="156" y="11" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#13B5EA">156</text>
      </g>
      <rect x="0" y="96" width="156" height="24" rx="12" fill="rgba(39,201,63,0.15)"/>
      <circle cx="14" cy="108" r="3" fill="#27c93f">
        <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="78" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#27c93f">SYNCED 2 MIN AGO</text>
    </g>
  </g>
  <!-- Bottom info bar -->
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#13B5EA"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Xero Integration V19</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Bi-directional sync of contacts, invoices &amp; payments with Xero</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="148" height="22" rx="11" fill="#714B67"/>
      <text x="74" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fff">✓ Compatible with Odoo 19</text>
    </g>
    <g transform="translate(186,68)">
      <rect x="0" y="0" width="84" height="22" rx="11" fill="rgba(19,181,234,0.15)" stroke="#13B5EA" stroke-width="1"/>
      <text x="42" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#0891B2">ACCOUNTING</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#13B5EA"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">FROM</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="14" fill="#fff">$15.99</text>
    </g>
