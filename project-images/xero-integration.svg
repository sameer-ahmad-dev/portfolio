<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13B5EA"/>
      <stop offset="100%" style="stop-color:#0891B2"/>
    </linearGradient>
    <pattern id="dotsXero" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.1)"/>
    </pattern>
    <filter id="softShadow7" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsXero)"/>
  <!-- Odoo card (left) -->
  <g transform="translate(50,50)" filter="url(#softShadow7)">
    <rect x="0" y="0" width="180" height="200" rx="14" fill="#fff"/>
    <rect x="0" y="0" width="180" height="44" rx="14" fill="#714B67"/>
    <rect x="0" y="30" width="180" height="14" fill="#714B67"/>
    <text x="90" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="18" fill="#fff">Odoo</text>
    <g transform="translate(12,56)">
      <text x="0" y="0" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#1a202c">INVOICES</text>
      <rect x="0" y="8" width="156" height="26" rx="5" fill="#f5f7fa"/>
      <rect x="6" y="14" width="38" height="5" rx="2" fill="#714B67"/>
      <rect x="6" y="22" width="60" height="3" rx="1" fill="#999"/>
      <text x="150" y="24" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#27c93f">$1,250</text>
      <rect x="0" y="38" width="156" height="26" rx="5" fill="#f5f7fa"/>
      <rect x="6" y="44" width="38" height="5" rx="2" fill="#714B67"/>
      <rect x="6" y="52" width="60" height="3" rx="1" fill="#999"/>
      <text x="150" y="54" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#27c93f">$890</text>
      <rect x="0" y="68" width="156" height="26" rx="5" fill="#f5f7fa"/>
      <rect x="6" y="74" width="38" height="5" rx="2" fill="#714B67"/>
      <rect x="6" y="82" width="60" height="3" rx="1" fill="#999"/>
      <text x="150" y="84" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#27c93f">$2,450</text>
      <rect x="0" y="98" width="156" height="26" rx="5" fill="#f5f7fa"/>
      <rect x="6" y="104" width="38" height="5" rx="2" fill="#714B67"/>
      <rect x="6" y="112" width="60" height="3" rx="1" fill="#999"/>
      <text x="150" y="114" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#27c93f">$3,100</text>
    </g>
  </g>
  <!-- Sync arrows (middle) -->
  <g transform="translate(245,140)">
    <path d="M0,5 L100,5 M88,-5 L100,5 L88,15" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M100,40 L0,40 M12,30 L0,40 L12,50" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="22" r="16" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="2"/>
    <path d="M44,16 A8,8 0 0,1 56,16 L52,16 M56,28 A8,8 0 0,1 44,28 L48,28" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="50" y="-10" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#fff">2-WAY SYNC</text>
  </g>
  <!-- Xero card (right) -->
