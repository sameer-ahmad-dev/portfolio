<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <pattern id="dotsMC" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.1)"/>
    </pattern>
    <filter id="softShadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsMC)"/>
  <!-- Product card mockup -->
  <g transform="translate(110,30)" filter="url(#softShadow6)">
    <rect x="0" y="0" width="380" height="240" rx="12" fill="#ffffff"/>
    <rect x="0" y="0" width="380" height="32" rx="12" fill="#f5f7fa"/>
    <rect x="0" y="22" width="380" height="10" fill="#f5f7fa"/>
    <circle cx="16" cy="16" r="4" fill="#ff5f56"/>
    <circle cx="30" cy="16" r="4" fill="#ffbd2e"/>
    <circle cx="44" cy="16" r="4" fill="#27c93f"/>
    <text x="190" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#999">myshop.com/shop/product</text>
    <!-- Product image -->
    <g transform="translate(20,46)">
      <rect x="0" y="0" width="150" height="180" rx="8" fill="#f0f4f8"/>
      <g transform="translate(45,55)">
        <path d="M30,60 Q30,15 60,15 Q90,15 90,60" stroke="#1a73e8" stroke-width="6" fill="none" stroke-linecap="round"/>
        <rect x="22" y="55" width="20" height="38" rx="6" fill="#1a73e8"/>
        <rect x="78" y="55" width="20" height="38" rx="6" fill="#1a73e8"/>
        <circle cx="32" cy="74" r="4" fill="#0d47a1"/>
        <circle cx="88" cy="74" r="4" fill="#0d47a1"/>
      </g>
      <rect x="8" y="8" width="40" height="18" rx="9" fill="#f38ba8"/>
      <text x="28" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#fff">SALE</text>
    </g>
    <!-- Product details -->
    <g transform="translate(190,56)">
      <text x="0" y="14" font-family="Arial,sans-serif" font-weight="800" font-size="14" fill="#1a202c">Wireless Headphones</text>
      <text x="0" y="30" font-family="Arial,sans-serif" font-size="9" fill="#999">Premium audio quality</text>
      <g transform="translate(0,40)">
        <text font-family="Arial,sans-serif" font-size="11" fill="#FFC837">★ ★ ★ ★ ★</text>
        <text x="62" y="0" font-family="Arial,sans-serif" font-size="9" fill="#999">(248)</text>
      </g>
      <!-- Primary price -->
      <text x="0" y="72" font-family="Arial,sans-serif" font-weight="900" font-size="24" fill="#1a73e8">$249.00</text>
      <text x="86" y="72" font-family="Arial,sans-serif" text-decoration="line-through" font-size="12" fill="#999">$329</text>
      <line x1="0" y1="84" x2="170" y2="84" stroke="#e0e6ed" stroke-width="1" stroke-dasharray="2,2"/>
      <!-- Secondary currencies -->
      <text x="0" y="98" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#999">ALSO SHOWN AS</text>
      <g transform="translate(0,104)">
        <circle cx="9" cy="9" r="8" fill="#1a73e8" opacity="0.12"/>
        <text x="9" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a73e8">€</text>
        <text x="24" y="13" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="#0d47a1">€229.50 EUR</text>
      </g>
      <g transform="translate(0,124)">
        <circle cx="9" cy="9" r="8" fill="#1a73e8" opacity="0.12"/>
        <text x="9" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a73e8">£</text>
        <text x="24" y="13" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="#0d47a1">£196.20 GBP</text>
      </g>
      <g transform="translate(0,144)">
        <circle cx="9" cy="9" r="8" fill="#1a73e8" opacity="0.12"/>
        <text x="9" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a73e8">¥</text>
        <text x="24" y="13" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="#0d47a1">¥37,485 JPY</text>
      </g>
      <rect x="0" y="166" width="170" height="24" rx="12" fill="#1a73e8"/>
      <text x="85" y="181" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#fff">+ ADD TO CART</text>
    </g>
  </g>
  <!-- Floating currency icons -->
  <g opacity="0.85">
    <circle cx="55" cy="100" r="22" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <text x="55" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="20" fill="#fff">$</text>
    <circle cx="540" cy="180" r="22" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <text x="540" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="20" fill="#fff">€</text>
    <circle cx="50" cy="220" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <text x="50" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="16" fill="#fff">£</text>
  </g>
  <!-- Bottom info bar -->
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#1a73e8"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Website Multi-Currency</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Dual-price display with auto FX conversion for eCommerce</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="148" height="22" rx="11" fill="#714B67"/>
      <text x="74" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fff">✓ Compatible with Odoo 19</text>
    </g>
    <g transform="translate(186,68)">
      <rect x="0" y="0" width="92" height="22" rx="11" fill="rgba(26,115,232,0.15)" stroke="#1a73e8" stroke-width="1"/>
      <text x="46" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1a73e8">eCOMMERCE</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#1a73e8"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">FROM</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="14" fill="#fff">$12.00</text>
    </g>
  </g>
</svg>
