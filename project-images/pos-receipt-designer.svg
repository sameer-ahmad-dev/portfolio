<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#EE5A6F"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f4f4f4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  <!-- Decorative shapes -->
  <circle cx="540" cy="60" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="60" cy="60" r="40" fill="rgba(255,255,255,0.06)"/>
  <!-- Designer panel (left) -->
  <g transform="translate(70,55)" filter="url(#softShadow)">
    <rect x="0" y="0" width="180" height="200" rx="10" fill="rgba(255,255,255,0.96)"/>
    <rect x="0" y="0" width="180" height="28" rx="10" fill="#EE5A6F"/>
    <rect x="0" y="18" width="180" height="10" fill="#EE5A6F"/>
    <circle cx="14" cy="14" r="3" fill="rgba(255,255,255,0.9)"/>
    <circle cx="24" cy="14" r="3" fill="rgba(255,255,255,0.9)"/>
    <circle cx="34" cy="14" r="3" fill="rgba(255,255,255,0.9)"/>
    <text x="90" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#fff">DESIGNER</text>
    <!-- Drag blocks -->
    <rect x="10" y="40" width="78" height="22" rx="4" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
    <text x="49" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#EE5A6F">TEXT</text>
    <rect x="92" y="40" width="78" height="22" rx="4" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
    <text x="131" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#EE5A6F">FIELD</text>
    <rect x="10" y="68" width="78" height="22" rx="4" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
    <text x="49" y="83" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#EE5A6F">IMAGE</text>
    <rect x="92" y="68" width="78" height="22" rx="4" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
    <text x="131" y="83" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#EE5A6F">QR CODE</text>
    <rect x="10" y="96" width="78" height="22" rx="4" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
    <text x="49" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#EE5A6F">BARCODE</text>
    <rect x="92" y="96" width="78" height="22" rx="4" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
    <text x="131" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#EE5A6F">DIVIDER</text>
    <rect x="10" y="124" width="78" height="22" rx="4" fill="#FF6B6B"/>
    <text x="49" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#fff">+ ADD</text>
    <rect x="92" y="124" width="78" height="22" rx="4" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
    <text x="131" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#EE5A6F">HTML</text>
    <line x1="10" y1="158" x2="170" y2="158" stroke="#f0f0f0" stroke-width="1"/>
    <text x="10" y="174" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#888">DRAG TO BUILD</text>
    <rect x="10" y="180" width="160" height="12" rx="6" fill="#f5f5f5"/>
    <rect x="10" y="180" width="100" height="12" rx="6" fill="#FF6B6B" opacity="0.4"/>
  </g>
  <!-- Live arrow -->
  <g transform="translate(265,128)">
    <circle cx="20" cy="20" r="22" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="2"/>
    <path d="M10,20 L30,20 M22,12 L30,20 L22,28" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#fff">LIVE</text>
  </g>
  <!-- Receipt preview (right) -->
  <g transform="translate(345,40)" filter="url(#softShadow)">
    <path d="M0,0 L170,0 L170,210 L160,222 L150,210 L140,222 L130,210 L120,222 L110,210 L100,222 L90,210 L80,222 L70,210 L60,222 L50,210 L40,222 L30,210 L20,222 L10,210 L0,222 Z" fill="url(#paper)"/>
    <text x="85" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="800" fill="#2c2c2c">YOUR STORE</text>
    <text x="85" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#888">123 Main Street • +1 555 0100</text>
    <line x1="14" y1="42" x2="156" y2="42" stroke="#bbb" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="14" y="56" font-family="Arial,sans-serif" font-size="9" fill="#444">Coffee Latte (L)</text>
    <text x="156" y="56" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#444">$4.50</text>
    <text x="14" y="68" font-family="Arial,sans-serif" font-size="9" fill="#444">Croissant</text>
    <text x="156" y="68" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#444">$3.20</text>
    <text x="14" y="80" font-family="Arial,sans-serif" font-size="9" fill="#444">Blueberry Muffin</text>
    <text x="156" y="80" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#444">$2.80</text>
    <line x1="14" y1="88" x2="156" y2="88" stroke="#bbb" stroke-width="0.6"/>
    <text x="14" y="102" font-family="Arial,sans-serif" font-size="10" fill="#666">Subtotal</text>
    <text x="156" y="102" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#444">$10.50</text>
    <text x="14" y="114" font-family="Arial,sans-serif" font-size="10" fill="#666">Tax 8%</text>
    <text x="156" y="114" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#444">$0.84</text>
    <line x1="14" y1="120" x2="156" y2="120" stroke="#bbb" stroke-width="0.6"/>
    <text x="14" y="134" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#2c2c2c">TOTAL</text>
    <text x="156" y="134" text-anchor="end" font-family="Arial,sans-serif" font-weight="800" font-size="13" fill="#EE5A6F">$11.34</text>
    <line x1="14" y1="142" x2="156" y2="142" stroke="#bbb" stroke-width="0.6" stroke-dasharray="2,2"/>
    <!-- QR Code -->
    <rect x="60" y="150" width="50" height="50" fill="#2c2c2c"/>
    <rect x="65" y="155" width="9" height="9" fill="#fff"/>
    <rect x="96" y="155" width="9" height="9" fill="#fff"/>
    <rect x="65" y="186" width="9" height="9" fill="#fff"/>
    <rect x="78" y="160" width="3" height="3" fill="#fff"/>
    <rect x="84" y="166" width="3" height="3" fill="#fff"/>
    <rect x="80" y="174" width="3" height="3" fill="#fff"/>
    <rect x="88" y="180" width="3" height="3" fill="#fff"/>
    <rect x="78" y="186" width="3" height="3" fill="#fff"/>
    <rect x="92" y="184" width="3" height="3" fill="#fff"/>
  </g>
  <!-- Bottom info bar -->
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#EE5A6F"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">POS Receipt Designer</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Drag-and-drop block-based receipt designer with live OWL preview</text>
    <!-- Compatible badge -->
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="148" height="22" rx="11" fill="#714B67"/>
      <text x="74" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fff">✓ Compatible with Odoo 19</text>
    </g>
    <g transform="translate(186,68)">
      <rect x="0" y="0" width="68" height="22" rx="11" fill="#FFE4E6" stroke="#FF6B6B" stroke-width="1"/>
      <text x="34" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#EE5A6F">POS</text>
    </g>
    <!-- Price tag -->
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#EE5A6F"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">FROM</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="14" fill="#fff">$20.00</text>
    </g>
  </g>
</svg>
