<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/><stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <pattern id="dotsCB" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.12)"/></pattern>
    <filter id="shCB" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsCB)"/>
  <!-- Phone with chat -->
  <g transform="translate(180,30)" filter="url(#shCB)">
    <rect x="0" y="0" width="240" height="250" rx="22" fill="#1a1f35"/>
    <rect x="8" y="8" width="224" height="234" rx="16" fill="#fff"/>
    <!-- Chat header -->
    <rect x="8" y="8" width="224" height="36" rx="16" fill="#fa709a"/>
    <rect x="8" y="34" width="224" height="10" fill="#fa709a"/>
    <circle cx="28" cy="26" r="11" fill="#fff"/>
    <text x="28" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#fa709a">🤖</text>
    <text x="46" y="24" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#fff">AI Assistant</text>
    <text x="46" y="36" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.85)">● Online</text>
    <!-- Bot bubble 1 -->
    <g transform="translate(20,60)">
      <rect x="0" y="0" width="150" height="36" rx="16" fill="#f5f7fa"/>
      <text x="12" y="18" font-family="Arial,sans-serif" font-size="10" fill="#1a202c">Hi! How can I help</text>
      <text x="12" y="30" font-family="Arial,sans-serif" font-size="10" fill="#1a202c">you today?</text>
    </g>
    <!-- User bubble -->
    <g transform="translate(64,104)">
      <rect x="0" y="0" width="156" height="36" rx="16" fill="#fa709a"/>
      <text x="146" y="18" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#fff">Where is my order</text>
      <text x="146" y="30" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#fff">#4521?</text>
    </g>
    <!-- Bot bubble 2 -->
    <g transform="translate(20,148)">
      <rect x="0" y="0" width="180" height="48" rx="16" fill="#f5f7fa"/>
      <text x="12" y="18" font-family="Arial,sans-serif" font-size="10" fill="#1a202c">📦 Your order is shipped</text>
      <text x="12" y="30" font-family="Arial,sans-serif" font-size="10" fill="#1a202c">and arrives Mon, Mar 12.</text>
      <text x="12" y="42" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#fa709a">Tap to track →</text>
    </g>
    <!-- Input -->
    <rect x="20" y="208" width="200" height="24" rx="12" fill="#f5f7fa" stroke="#e0e6ed" stroke-width="1"/>
    <text x="32" y="223" font-family="Arial,sans-serif" font-size="9" fill="#999">Type a message...</text>
    <circle cx="210" cy="220" r="8" fill="#fa709a"/>
    <path d="M206,220 L214,220 M211,217 L214,220 L211,223" stroke="#fff" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Tickets reduced badge -->
  <g transform="translate(60,140)">
    <rect x="-30" y="-12" width="100" height="48" rx="12" fill="rgba(255,255,255,0.95)"/>
    <text x="20" y="4" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#666">SUPPORT TICKETS</text>
    <text x="20" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="18" fill="#27c93f">▼ 60%</text>
  </g>
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#fa709a"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">AI Customer Chatbot</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">GPT-powered support bot — handles queries, orders &amp; recs</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="118" height="22" rx="11" fill="#1a202c"/>
      <text x="59" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fbbf24">★ CLIENT PROJECT</text>
    </g>
    <g transform="translate(156,68)">
      <rect x="0" y="0" width="100" height="22" rx="11" fill="rgba(250,112,154,0.15)" stroke="#fa709a" stroke-width="1"/>
      <text x="50" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fa709a">OPENAI GPT</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#fa709a"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">TICKETS</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#fff">▼ 60%</text>
    </g>
  </g>
</svg>
