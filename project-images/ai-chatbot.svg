<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="500" cy="80" r="110" fill="rgba(255,255,255,0.06)"/>
  <circle cx="80" cy="350" r="80" fill="rgba(255,255,255,0.04)"/>
  <!-- Robot / Chat interface -->
  <g transform="translate(200,30)">
    <!-- Robot head -->
    <rect x="50" y="20" width="80" height="65" rx="16" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.85)" stroke-width="2.5"/>
    <!-- Antenna -->
    <line x1="90" y1="20" x2="90" y2="5" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <circle cx="90" cy="3" r="5" fill="rgba(255,255,255,0.8)"/>
    <!-- Eyes -->
    <circle cx="72" cy="48" r="8" fill="rgba(255,255,255,0.9)"/>
    <circle cx="108" cy="48" r="8" fill="rgba(255,255,255,0.9)"/>
    <circle cx="74" cy="46" r="3" fill="rgba(0,0,0,0.4)"/>
    <circle cx="110" cy="46" r="3" fill="rgba(0,0,0,0.4)"/>
    <!-- Mouth -->
    <rect x="72" y="64" width="36" height="6" rx="3" fill="rgba(255,255,255,0.6)"/>
    <!-- Chat bubbles -->
    <g transform="translate(-30,95)">
      <rect x="0" y="0" width="110" height="32" rx="10" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <rect x="10" y="10" width="50" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
      <rect x="10" y="19" width="35" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
    </g>
    <g transform="translate(90,105)">
      <rect x="0" y="0" width="100" height="32" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <rect x="10" y="10" width="45" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
      <rect x="10" y="19" width="60" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
    </g>
    <!-- Typing indicator -->
    <g transform="translate(10,145)">
      <rect x="0" y="0" width="60" height="25" rx="10" fill="rgba(255,255,255,0.2)"/>
      <circle cx="16" cy="12" r="3.5" fill="rgba(255,255,255,0.6)"/>
      <circle cx="30" cy="12" r="3.5" fill="rgba(255,255,255,0.5)"/>
      <circle cx="44" cy="12" r="3.5" fill="rgba(255,255,255,0.4)"/>
    </g>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="white">AI Customer Chatbot</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">GPT-Powered • Reduced Tickets by 60%</text>
  <g transform="translate(120,310)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="45" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">OpenAI</text>
    <rect x="100" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="135" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">FastAPI</text>
    <rect x="180" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="215" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Python</text>
    <rect x="260" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="305" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">JavaScript</text>
  </g>
</svg>