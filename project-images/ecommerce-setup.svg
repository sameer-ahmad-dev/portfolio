      <text x="120" y="14" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#666">↻ POS sync • Stripe • Multi-language</text>
      <text x="420" y="14" text-anchor="end" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#27c93f">● ONLINE</text>
    </g>
