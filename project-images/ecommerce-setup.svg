      <rect x="0" y="0" width="100" height="60" rx="6" fill="#fef3c7"/>
      <circle cx="50" cy="30" r="18" fill="#e8a942"/>
      <text x="8" y="74" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Date Premium</text>
      <text x="8" y="86" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#c46d00">$12.99</text>
      <text x="92" y="86" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#FFC837">★★★★★</text>

      <rect x="110" y="0" width="100" height="100" rx="6" fill="#fff" stroke="#e0e6ed" stroke-width="1"/>
      <rect x="110" y="0" width="100" height="60" rx="6" fill="#dcfce7"/>
      <rect x="146" y="14" width="28" height="40" rx="6" fill="#0AA64D"/>
      <text x="118" y="74" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Olive Oil</text>
      <text x="118" y="86" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#c46d00">$24.99</text>
      <text x="202" y="86" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#FFC837">★★★★☆</text>

      <rect x="220" y="0" width="100" height="100" rx="6" fill="#fff" stroke="#e0e6ed" stroke-width="1"/>
      <rect x="220" y="0" width="100" height="60" rx="6" fill="#fce7f3"/>
      <circle cx="270" cy="30" r="18" fill="#ec4899"/>
      <text x="228" y="74" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Rose Tea</text>
      <text x="228" y="86" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#c46d00">$8.50</text>
      <text x="312" y="86" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#FFC837">★★★★★</text>

      <rect x="330" y="0" width="102" height="100" rx="6" fill="#fff" stroke="#e0e6ed" stroke-width="1"/>
      <rect x="330" y="0" width="102" height="60" rx="6" fill="#fef3c7"/>
      <rect x="368" y="14" width="28" height="40" rx="3" fill="#FFC837"/>
      <text x="338" y="74" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#1a202c">Honey Jar</text>
      <text x="338" y="86" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#c46d00">$15.00</text>
      <text x="424" y="86" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#FFC837">★★★★★</text>
