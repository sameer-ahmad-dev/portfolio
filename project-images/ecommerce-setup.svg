<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a942"/><stop offset="100%" style="stop-color:#c46d00"/>
    </linearGradient>
    <pattern id="dotsEC" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.14)"/></pattern>
    <filter id="shEC" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsEC)"/>
  <!-- Storefront -->
  <g transform="translate(70,30)" filter="url(#shEC)">
    <rect x="0" y="0" width="460" height="250" rx="12" fill="#fff"/>
    <rect x="0" y="0" width="460" height="32" rx="12" fill="#f5f7fa"/>
    <rect x="0" y="22" width="460" height="10" fill="#f5f7fa"/>
    <circle cx="14" cy="16" r="4" fill="#ff5f56"/><circle cx="28" cy="16" r="4" fill="#ffbd2e"/><circle cx="42" cy="16" r="4" fill="#27c93f"/>
    <text x="230" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#999">myshop.com</text>
