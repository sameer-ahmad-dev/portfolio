<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fddb92"/>
      <stop offset="100%" style="stop-color:#d1fdff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="510" cy="80" r="110" fill="rgba(255,255,255,0.15)"/>
  <circle cx="80" cy="350" r="80" fill="rgba(255,255,255,0.1)"/>
  <!-- Shopping / E-commerce -->
  <g transform="translate(190,30)">
    <!-- Browser window -->
    <rect x="10" y="10" width="180" height="130" rx="8" fill="rgba(255,255,255,0.35)" stroke="rgba(100,80,40,0.4)" stroke-width="2"/>
    <!-- Browser bar -->
    <rect x="10" y="10" width="180" height="22" rx="8" fill="rgba(100,80,40,0.1)"/>
    <circle cx="25" cy="21" r="4" fill="rgba(255,100,100,0.5)"/>
    <circle cx="37" cy="21" r="4" fill="rgba(255,200,50,0.5)"/>
    <circle cx="49" cy="21" r="4" fill="rgba(100,200,100,0.5)"/>
    <!-- Product grid -->
    <rect x="20" y="40" width="45" height="40" rx="4" fill="rgba(100,80,40,0.12)" stroke="rgba(100,80,40,0.2)" stroke-width="1"/>
    <rect x="72" y="40" width="45" height="40" rx="4" fill="rgba(100,80,40,0.12)" stroke="rgba(100,80,40,0.2)" stroke-width="1"/>
    <rect x="124" y="40" width="55" height="40" rx="4" fill="rgba(100,80,40,0.12)" stroke="rgba(100,80,40,0.2)" stroke-width="1"/>
    <!-- Price tags -->
    <text x="42" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(100,80,40,0.6)">$29.99</text>
    <text x="95" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(100,80,40,0.6)">$49.99</text>
    <text x="152" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(100,80,40,0.6)">$19.99</text>
    <!-- Product lines -->
    <rect x="20" y="88" width="45" height="6" rx="2" fill="rgba(100,80,40,0.15)"/>
    <rect x="72" y="88" width="45" height="6" rx="2" fill="rgba(100,80,40,0.15)"/>
    <rect x="124" y="88" width="55" height="6" rx="2" fill="rgba(100,80,40,0.15)"/>
    <!-- Buy buttons -->
    <rect x="25" y="100" width="35" height="14" rx="4" fill="rgba(100,180,80,0.3)" stroke="rgba(100,180,80,0.5)" stroke-width="1"/>
    <rect x="77" y="100" width="35" height="14" rx="4" fill="rgba(100,180,80,0.3)" stroke="rgba(100,180,80,0.5)" stroke-width="1"/>
    <rect x="134" y="100" width="35" height="14" rx="4" fill="rgba(100,180,80,0.3)" stroke="rgba(100,180,80,0.5)" stroke-width="1"/>
    <!-- Cart icon -->
    <g transform="translate(155,120)">
      <circle cx="15" cy="15" r="18" fill="rgba(100,80,40,0.15)" stroke="rgba(100,80,40,0.3)" stroke-width="1.5"/>
      <text x="15" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="rgba(100,80,40,0.6)">🛒</text>
      <circle cx="27" cy="5" r="8" fill="rgba(255,100,80,0.4)"/>
      <text x="27" y="9" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="white">3</text>
    </g>
  </g>
  <text x="300" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="rgba(80,60,20,0.9)">E-commerce Odoo Setup</text>
  <text x="300" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(80,60,20,0.6)">Full Online Store • POS Integration</text>
  <g transform="translate(110,305)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.35)" stroke="rgba(100,80,40,0.25)" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,60,20,0.8)">E-commerce</text>
    <rect x="110" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.35)" stroke="rgba(100,80,40,0.25)" stroke-width="1"/>
    <text x="160" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,60,20,0.8)">Payment API</text>
    <rect x="220" y="0" width="60" height="28" rx="14" fill="rgba(255,255,255,0.35)" stroke="rgba(100,80,40,0.25)" stroke-width="1"/>
    <text x="250" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(80,60,20,0.8)">CSS</text>
  </g>
</svg>