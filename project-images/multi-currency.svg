<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="510" cy="90" r="110" fill="rgba(255,255,255,0.06)"/>
  <circle cx="80" cy="340" r="80" fill="rgba(255,255,255,0.04)"/>
  <!-- Currency symbols -->
  <g transform="translate(170,35)">
    <!-- Dollar -->
    <circle cx="50" cy="55" r="38" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
    <text x="50" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="32" fill="rgba(255,255,255,0.9)">$</text>
    <!-- Euro -->
    <circle cx="140" cy="40" r="32" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
    <text x="140" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="28" fill="rgba(255,255,255,0.85)">€</text>
    <!-- Pound -->
    <circle cx="215" cy="60" r="28" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <text x="215" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="24" fill="rgba(255,255,255,0.8)">£</text>
    <!-- PKR -->
    <circle cx="100" cy="105" r="25" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="100" y="113" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="rgba(255,255,255,0.7)">PKR</text>
    <!-- Exchange arrows -->
    <path d="M90,55 Q120,20 140,40" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M170,50 Q195,35 215,60" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M50,93 Q70,110 100,105" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Chart bars -->
    <g transform="translate(0,130)">
      <rect x="40" y="15" width="18" height="35" rx="3" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <rect x="68" y="5" width="18" height="45" rx="3" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <rect x="96" y="20" width="18" height="30" rx="3" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <rect x="124" y="0" width="18" height="50" rx="3" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
      <rect x="152" y="10" width="18" height="40" rx="3" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <rect x="180" y="8" width="18" height="42" rx="3" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </g>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="white">Multi-Currency Accounting</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">4 Branches • Auto Exchange Rates</text>
  <g transform="translate(125,310)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Odoo 17</text>
    <rect x="90" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="140" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">PostgreSQL</text>
    <rect x="200" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="245" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Forex API</text>
  </g>
</svg>