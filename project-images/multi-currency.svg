<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc"/><stop offset="100%" style="stop-color:#003d7a"/>
    </linearGradient>
    <pattern id="dotsMU" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.12)"/></pattern>
    <filter id="shMU" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsMU)"/>
  <!-- Accounting dashboard -->
  <g transform="translate(70,40)" filter="url(#shMU)">
    <rect x="0" y="0" width="460" height="230" rx="12" fill="#fff"/>
    <rect x="0" y="0" width="460" height="36" rx="12" fill="#003d7a"/>
    <rect x="0" y="26" width="460" height="10" fill="#003d7a"/>
    <text x="20" y="22" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#fff">⊞ MULTI-CURRENCY LEDGER</text>
    <text x="440" y="22" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.75)">FX auto-update ↻</text>
    <!-- Branch rows -->
    <g transform="translate(20,52)">
      <text x="0" y="0" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#999">BRANCH</text>
      <text x="160" y="0" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#999">LOCAL CURRENCY</text>
      <text x="290" y="0" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#999">USD EQUIV.</text>
      <text x="420" y="0" text-anchor="end" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#999">RATE</text>
      <line x1="0" y1="6" x2="420" y2="6" stroke="#e0e6ed" stroke-width="1"/>
      <!-- Branch 1 -->
      <g transform="translate(0,16)">
        <circle cx="6" cy="10" r="6" fill="#0066cc"/>
        <text x="6" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#fff">P</text>
        <text x="20" y="14" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1a202c">Pakistan</text>
        <text x="160" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#1a202c">PKR 14,28,500</text>
        <text x="290" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#27c93f">$5,114</text>
        <text x="420" y="14" text-anchor="end" font-family="monospace" font-size="9" fill="#666">279.34</text>
      </g>
      <line x1="0" y1="34" x2="420" y2="34" stroke="#f5f7fa" stroke-width="1"/>
      <g transform="translate(0,40)">
        <circle cx="6" cy="10" r="6" fill="#0AA64D"/>
        <text x="6" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#fff">U</text>
        <text x="20" y="14" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1a202c">UAE Dubai</text>
        <text x="160" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#1a202c">AED 32,400</text>
        <text x="290" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#27c93f">$8,820</text>
        <text x="420" y="14" text-anchor="end" font-family="monospace" font-size="9" fill="#666">3.673</text>
      </g>
      <line x1="0" y1="58" x2="420" y2="58" stroke="#f5f7fa" stroke-width="1"/>
      <g transform="translate(0,64)">
        <circle cx="6" cy="10" r="6" fill="#FF8008"/>
        <text x="6" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#fff">U</text>
        <text x="20" y="14" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1a202c">UK London</text>
        <text x="160" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#1a202c">GBP 6,950</text>
        <text x="290" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#27c93f">$8,772</text>
        <text x="420" y="14" text-anchor="end" font-family="monospace" font-size="9" fill="#666">1.262</text>
      </g>
      <line x1="0" y1="82" x2="420" y2="82" stroke="#f5f7fa" stroke-width="1"/>
      <g transform="translate(0,88)">
        <circle cx="6" cy="10" r="6" fill="#cba6f7"/>
        <text x="6" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#fff">E</text>
        <text x="20" y="14" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1a202c">Germany</text>
        <text x="160" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#1a202c">EUR 7,200</text>
        <text x="290" y="14" font-family="monospace" font-weight="700" font-size="10" fill="#27c93f">$7,851</text>
        <text x="420" y="14" text-anchor="end" font-family="monospace" font-size="9" fill="#666">1.090</text>
      </g>
      <line x1="0" y1="108" x2="420" y2="108" stroke="#003d7a" stroke-width="1.5"/>
      <g transform="translate(0,114)">
        <text x="0" y="14" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#1a202c">CONSOLIDATED TOTAL</text>
        <text x="290" y="14" font-family="monospace" font-weight="900" font-size="13" fill="#003d7a">$30,557 USD</text>
        <text x="420" y="14" text-anchor="end" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#27c93f">▲ +12%</text>
      </g>
    </g>
    <!-- Speed comparison -->
    <g transform="translate(20,196)">
      <rect x="0" y="0" width="420" height="22" rx="11" fill="rgba(0,102,204,0.08)"/>
      <text x="12" y="15" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#666">MONTH-END CLOSE:</text>
      <text x="160" y="15" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#999" text-decoration="line-through">5 days</text>
      <text x="200" y="15" font-family="Arial,sans-serif" font-weight="900" font-size="9" fill="#27c93f">→ 1 day  ▼ 80%</text>
    </g>
  </g>
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#0066cc"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Multi-Currency Accounting</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Cross-branch accounting with auto FX &amp; reconciliation</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="118" height="22" rx="11" fill="#1a202c"/>
      <text x="59" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fbbf24">★ CLIENT PROJECT</text>
    </g>
    <g transform="translate(156,68)">
      <rect x="0" y="0" width="100" height="22" rx="11" fill="rgba(0,102,204,0.15)" stroke="#0066cc" stroke-width="1"/>
      <text x="50" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#003d7a">FOREX API</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#0066cc"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">CLOSE</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#fff">5d→1d</text>
    </g>
  </g>
</svg>
