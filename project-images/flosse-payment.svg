<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a11cb"/><stop offset="100%" style="stop-color:#2575fc"/>
    </linearGradient>
    <pattern id="dotsFL" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="rgba(255,255,255,0.12)"/></pattern>
    <filter id="shFL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dotsFL)"/>
  <!-- Credit card -->
  <g transform="translate(80,50)" filter="url(#shFL)">
    <rect x="0" y="0" width="240" height="150" rx="14" fill="#1a1f35"/>
    <rect x="0" y="0" width="240" height="150" rx="14" fill="url(#bg)" opacity="0.8"/>
    <text x="20" y="32" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="rgba(255,255,255,0.85)">FLOSSE PAY</text>
    <text x="220" y="32" text-anchor="end" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="rgba(255,255,255,0.6)">●●●●</text>
    <!-- Chip -->
    <rect x="20" y="48" width="40" height="30" rx="4" fill="#FFC837"/>
    <line x1="28" y1="56" x2="52" y2="56" stroke="#a16207" stroke-width="0.5"/>
    <line x1="28" y1="62" x2="52" y2="62" stroke="#a16207" stroke-width="0.5"/>
    <line x1="28" y1="68" x2="52" y2="68" stroke="#a16207" stroke-width="0.5"/>
    <text x="20" y="106" font-family="monospace" font-weight="700" font-size="14" fill="#fff" letter-spacing="2">5421 7892 3654</text>
    <text x="20" y="124" font-family="monospace" font-weight="700" font-size="11" fill="rgba(255,255,255,0.7)">★★★★</text>
    <text x="20" y="142" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="rgba(255,255,255,0.7)">CARDHOLDER NAME</text>
    <text x="220" y="142" text-anchor="end" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="rgba(255,255,255,0.85)">12/28</text>
  </g>
  <!-- Payment status panel -->
  <g transform="translate(350,50)" filter="url(#shFL)">
    <rect x="0" y="0" width="200" height="200" rx="12" fill="#fff"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="#27c93f"/>
    <text x="100" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#1a202c">PAYMENT</text>
    <text x="100" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#27c93f">SUCCESSFUL</text>
    <circle cx="100" cy="86" r="22" fill="#27c93f"/>
    <path d="M88,86 L96,94 L114,76" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="20" y1="120" x2="180" y2="120" stroke="#e0e6ed" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="20" y="138" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#666">AMOUNT</text>
    <text x="180" y="138" text-anchor="end" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#1a202c">$249.00</text>
    <text x="20" y="156" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#666">ORDER</text>
    <text x="180" y="156" text-anchor="end" font-family="monospace" font-weight="700" font-size="10" fill="#1a202c">#4521</text>
    <text x="20" y="174" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#666">METHOD</text>
    <text x="180" y="174" text-anchor="end" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#2575fc">FLOSSE</text>
    <rect x="20" y="184" width="160" height="12" rx="6" fill="rgba(39,201,63,0.15)"/>
    <text x="100" y="193" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="8" fill="#0F7B3F">WEBHOOK CONFIRMED</text>
  </g>
  <!-- Connection lines -->
  <g opacity="0.7" transform="translate(320,140)">
    <path d="M0,0 L30,0" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="15" cy="0" r="6" fill="rgba(255,255,255,0.3)"/>
    <text x="15" y="-12" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#fff">SECURE</text>
  </g>
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
    <rect x="0" y="0" width="600" height="2" fill="#2575fc"/>
    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Flosse Payment Integration</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Custom payment gateway for Odoo website + mobile app sync</text>
    <g transform="translate(30,68)">
      <rect x="0" y="0" width="118" height="22" rx="11" fill="#1a202c"/>
      <text x="59" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fbbf24">★ CLIENT PROJECT</text>
    </g>
    <g transform="translate(156,68)">
      <rect x="0" y="0" width="116" height="22" rx="11" fill="rgba(37,117,252,0.15)" stroke="#2575fc" stroke-width="1"/>
      <text x="58" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#2575fc">REST + WEBHOOKS</text>
    </g>
    <g transform="translate(495,55)">
      <rect x="0" y="0" width="80" height="36" rx="6" fill="#2575fc"/>
      <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="rgba(255,255,255,0.85)">SECURITY</text>
      <text x="40" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="13" fill="#fff">SSL</text>
    </g>
  </g>
</svg>
