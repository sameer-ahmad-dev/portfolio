    <rect x="0" y="0" width="440" height="32" rx="12" fill="#f5f7fa"/>
    <rect x="0" y="22" width="440" height="10" fill="#f5f7fa"/>
    <circle cx="14" cy="16" r="4" fill="#ff5f56"/><circle cx="28" cy="16" r="4" fill="#ffbd2e"/><circle cx="42" cy="16" r="4" fill="#27c93f"/>
    <text x="220" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#999">Warehouse → Stock Overview</text>
    <g transform="translate(20,46)">
