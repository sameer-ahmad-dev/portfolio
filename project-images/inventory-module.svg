<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="400" fill="url(#shine)"/>
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="500" cy="80" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="100" cy="350" r="80" fill="rgba(255,255,255,0.04)"/>
  <!-- Warehouse icon -->
  <g transform="translate(230,80)">
    <rect x="10" y="60" width="120" height="80" rx="4" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
    <polygon points="70,20 140,60 0,60" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
    <!-- Shelves -->
    <line x1="20" y1="90" x2="120" y2="90" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <line x1="20" y1="115" x2="120" y2="115" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <!-- Boxes -->
    <rect x="30" y="70" width="18" height="18" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <rect x="55" y="70" width="18" height="18" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <rect x="90" y="70" width="18" height="18" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <rect x="30" y="96" width="18" height="16" rx="2" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <rect x="55" y="96" width="18" height="16" rx="2" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <!-- Gear -->
    <circle cx="130" cy="40" r="18" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <circle cx="130" cy="40" r="7" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
    <line x1="130" y1="20" x2="130" y2="26" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <line x1="130" y1="54" x2="130" y2="60" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <line x1="110" y1="40" x2="116" y2="40" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <line x1="144" y1="40" x2="150" y2="40" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
  </g>
  <!-- Text -->
  <text x="300" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="26" fill="white">Custom Inventory Module</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)">Odoo 17 • Real-time Stock Tracking</text>
  <!-- Tech badges -->
  <g transform="translate(155,310)">
    <rect x="0" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Python</text>
    <rect x="80" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="125" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">PostgreSQL</text>
    <rect x="180" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="220" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">Odoo 17</text>
  </g>
</svg>