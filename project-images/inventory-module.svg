      <text x="12" y="44" font-family="Arial,sans-serif" font-weight="900" font-size="22" fill="#1a202c">12,847</text>
      <text x="12" y="60" font-family="Arial,sans-serif" font-size="9" fill="#27c93f">▲ +234 this week</text>
      <rect x="140" y="0" width="130" height="68" rx="8" fill="#f0f4ff" stroke="#667eea" stroke-width="1"/>
      <text x="152" y="18" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#667eea">LOW STOCK</text>
      <text x="152" y="44" font-family="Arial,sans-serif" font-weight="900" font-size="22" fill="#f5576c">23</text>
      <text x="152" y="60" font-family="Arial,sans-serif" font-size="9" fill="#f5576c">⚠ Reorder needed</text>
      <rect x="280" y="0" width="120" height="68" rx="8" fill="#f0f4ff" stroke="#667eea" stroke-width="1"/>
      <text x="292" y="18" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#667eea">WAREHOUSES</text>
      <text x="292" y="44" font-family="Arial,sans-serif" font-weight="900" font-size="22" fill="#1a202c">4</text>
      <text x="292" y="60" font-family="Arial,sans-serif" font-size="9" fill="#666">Multi-location</text>
    </g>
    <g transform="translate(20,128)">
      <text x="0" y="0" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#1a202c">STOCK MOVEMENT</text>
      <rect x="0" y="10" width="400" height="80" rx="6" fill="#fafbfc"/>
      <polyline points="20,80 60,55 100,65 140,40 180,50 220,30 260,42 300,25 340,35 380,18" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="20,80 60,55 100,65 140,40 180,50 220,30 260,42 300,25 340,35 380,18 380,80 20,80" fill="rgba(102,126,234,0.15)" stroke="none"/>
      <circle cx="380" cy="18" r="4" fill="#667eea"/>
      <circle cx="380" cy="18" r="8" fill="#667eea" opacity="0.3"/>
    </g>
  </g>
  <g transform="translate(0,295)">
    <rect x="0" y="0" width="600" height="105" fill="rgba(255,255,255,0.97)"/>
