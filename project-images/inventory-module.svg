    <text x="30" y="34" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#1a202c">Custom Inventory Module</text>
    <text x="30" y="56" font-family="Arial,sans-serif" font-size="12" fill="#5b6470">Real-time stock tracking with automated reorder rules</text>
